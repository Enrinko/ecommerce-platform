name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shop
          POSTGRES_PASSWORD: shop
          POSTGRES_DB: shop
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U shop"
          --health-interval 5s --health-timeout 5s --health-retries 10
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping')\""
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://shop:shop@localhost:5432/shop
      MONGO_URL: mongodb://localhost:27017/shop
      JWT_ACCESS_SECRET: ci_access_secret_not_for_production_0123456789
      JWT_REFRESH_SECRET: ci_refresh_secret_not_for_production_0123456789
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci_admin_password_change_me
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json "packageManager"; do not also set
      # `version` here or pnpm/action-setup errors on the duplicate.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api exec prisma generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter api exec prisma migrate deploy
      - run: pnpm --filter api db:seed
      - run: pnpm --filter api test:e2e
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shop
          POSTGRES_PASSWORD: shop
          POSTGRES_DB: shop
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U shop"
          --health-interval 5s --health-timeout 5s --health-retries 10
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping')\""
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://shop:shop@localhost:5432/shop
      MONGO_URL: mongodb://localhost:27017/shop
      JWT_ACCESS_SECRET: ci_access_secret_not_for_production_0123456789
      JWT_REFRESH_SECRET: ci_refresh_secret_not_for_production_0123456789
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci_admin_password_change_me
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      # The web app (origin :3001) makes cross-origin browser requests to the API
      # (:3000); without this allowlist the API blocks them and client calls fail.
      CORS_ORIGINS: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api exec prisma generate
      # @repo/types is consumed from its built dist by both the API and the web app.
      - run: pnpm --filter @repo/types build
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm --filter web run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: apps/web/test-results/
          retention-days: 7
